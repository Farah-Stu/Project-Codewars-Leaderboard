<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codewars Leaderboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
    <div class="container">
      <div class="controls">
        <h1>Codewars Leaderboard</h1>
        <section class="form-section">
          <label for="usernames">Usernames:</label>
          <input
            type="text"
            id="usernames"
            name="usernames"
            placeholder="Enter usernames (e.g. CodeYourFuture,Farah-Stu,40thieves)"
          />
          <button type="submit" id="fetch-btn">Fetch Leaderboard</button>
        </section>
        <section class="dropdown-section">
          <label for="language-select">Select Ranking:</label>
          <select id="language-select" name="language-select">
            <option value="overall">Overall</option>
          </select>
        </section>
        <p id="error-message"></p>
      </div>

      <div class="table-area">
        <table>
          <thead>
            <tr>
              <th scope="col">Username</th>
              <th scope="col">Clan</th>
              <th scope="col">Score</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>
</main>
    <script type ="module" src="index.mjs"></script>
  </body>
</html>
